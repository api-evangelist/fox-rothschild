name: Fox Rothschild LLP
description: >-
  Fox Rothschild LLP is a national US law firm with approximately 1,000
  attorneys across 30+ offices. The firm has no public developer APIs. Its
  programmatic surface is limited to publication and content distribution:
  subscription-based email alerts and 21+ topical attorney-authored blogs
  hosted on the LexBlog (WordPress) platform, each of which exposes a standard
  WordPress RSS 2.0 feed at /feed/. This index catalogs the firm and the
  RSS-able LexBlog network as the consumable surface.
